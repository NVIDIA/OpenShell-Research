[project]
site_name = "OpenShell Research"
site_description = "Research engineering Dev Notes and software documentation from the OpenShell team."
site_author = "OpenShell Research Engineering"
repo_url = "https://github.com/NVIDIA/OpenShell-Research"
repo_name = "OpenShell Research on GitHub"
copyright = """
<a href="https://github.com/NVIDIA/OpenShell">OpenShell on GitHub <span aria-hidden="true">↗</span></a>
"""
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/dev-notes.css"]
extra_javascript = ["javascripts/navigation-drawer.js"]
nav = [
  {"Dev Notes" = [
    "dev-notes/index.md",
    {"Posts" = [
      # dev-notes:nav:start
      {"Bringing Privacy and Security to the Edge with OpenShell" = "dev-notes/posts/2026-07-20-policy-controlling-reachy-mini-with-openshell.md"}
      # dev-notes:nav:end
    ]}
  ]},
  {"Documentation" = [
    "documentation/index.md",
    {"Privacy Guard" = [
      {"Architecture" = [
        "documentation/privacy-guard/architecture/index.md",
        {"Request lifecycle" = "documentation/privacy-guard/architecture/request-lifecycle.md"},
        {"Scanners" = "documentation/privacy-guard/architecture/scanners.md"},
        {"Format handlers" = "documentation/privacy-guard/architecture/format-handlers.md"},
        {"Service boundary" = "documentation/privacy-guard/architecture/service-boundary.md"},
        {"Safety and limits" = "documentation/privacy-guard/architecture/safety-and-limits.md"}
      ]}
    ]}
  ]}
]

[project.extra]
homepage = "."
generator = false

[project.theme]
custom_dir = "overrides"
favicon = "assets/brand/favicon.svg"
logo = "assets/brand/openshell-mark.svg"
icon.repo = "fontawesome/brands/github"
features = [
  "navigation.sections",
  "navigation.indexes",
  "navigation.path",
  "navigation.top",
  "search.highlight",
  "toc.follow"
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "black"
accent = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"
