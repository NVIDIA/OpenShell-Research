<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 664" role="img"
     aria-label="Reachy request flow: audio moves from the person through the trusted native app into the sandboxed agent and the OpenAI Realtime model; robot requests pass through the OpenShell gateway, which allows the camera capture path and denies the movement path.">
  <defs>
    <style>
      .panel   { fill:#ffffff; stroke:#e6ebde; stroke-width:1.5; }
      .node    { fill:#ffffff; stroke:#d8ded0; stroke-width:1.5; }
      .sandbox { fill:#fbfdf7; stroke:#cbd6bb; stroke-width:1.5; stroke-dasharray:5 4; }
      .policy  { fill:#f2f8e8; stroke:#76b900; stroke-width:2.25; }
      .allow   { fill:#f2f8e8; stroke:#76b900; stroke-width:2; }
      .deny    { fill:#fdeef0; stroke:#d1495b; stroke-width:2; }
      .title   { font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#1b1c1e; }
      .sub     { font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#6a7160; }
      .mono    { font:500 11.5px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#6a7160; }
      .eyebrow { font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#4f7d00; letter-spacing:.16em; }
      .grouplbl{ font:600 11px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#7f8a71; letter-spacing:.1em; }
      .flowlbl { font:500 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#6a7160; }
      .flowa   { font:600 11.5px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#4f7d00; }
      .flowd   { font:600 11.5px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#b23a4a; }
      .badgeA  { font:700 10px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#ffffff; letter-spacing:.08em; }
      .badgeD  { font:700 10px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#ffffff; letter-spacing:.08em; }
    </style>
    <filter id="soft" x="-8%" y="-14%" width="116%" height="128%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1b2a08" flood-opacity="0.10"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0.5 L9 5 L0 9.5 Z" fill="#9aa290"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0.5 L9 5 L0 9.5 Z" fill="#76b900"/></marker>
    <marker id="ad" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0.5 L9 5 L0 9.5 Z" fill="#d1495b"/></marker>
  </defs>

  <rect class="panel" x="8" y="8" width="944" height="648" rx="20"/>
  <text class="eyebrow" x="480" y="44" text-anchor="middle">REQUEST FLOW ON REACHY</text>

  <!-- ===== Level 1: person + native app ===== -->
  <g filter="url(#soft)"><rect class="node" x="90" y="72" width="180" height="72" rx="13"/></g>
  <text class="title" x="180" y="106" text-anchor="middle">Person near Reachy</text>
  <text class="sub" x="180" y="126" text-anchor="middle">speaks and listens</text>

  <g filter="url(#soft)"><rect class="node" x="560" y="72" width="310" height="72" rx="13"/></g>
  <text class="title" x="715" y="104" text-anchor="middle">Trusted native Reachy App</text>
  <text class="sub" x="715" y="124" text-anchor="middle">microphone · speaker · camera</text>

  <line x1="272" y1="108" x2="558" y2="108" stroke="#9aa290" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
  <text class="flowlbl" x="415" y="100" text-anchor="middle">voice</text>

  <!-- ===== Level 2: sandbox + model ===== -->
  <rect class="sandbox" x="90" y="196" width="520" height="108" rx="15"/>
  <text class="grouplbl" x="110" y="216">OPENSHELL SANDBOX</text>
  <g filter="url(#soft)"><rect class="node" x="118" y="228" width="230" height="60" rx="11"/></g>
  <text class="title" x="233" y="254" text-anchor="middle">Conversation agent</text>
  <text class="sub" x="233" y="273" text-anchor="middle">Realtime client + fixed tools</text>
  <g filter="url(#soft)"><rect class="node" x="372" y="228" width="212" height="60" rx="11"/></g>
  <text class="title" x="478" y="254" text-anchor="middle">Loopback audio</text>
  <text class="mono" x="478" y="273" text-anchor="middle">127.0.0.1:8765</text>

  <g filter="url(#soft)"><rect class="node" x="690" y="214" width="180" height="72" rx="13"/></g>
  <text class="title" x="780" y="246" text-anchor="middle">OpenAI Realtime API</text>
  <text class="sub" x="780" y="266" text-anchor="middle">remote model</text>

  <!-- native -> audio (PCM) -->
  <path d="M690 144 C620 176, 540 190, 490 226" fill="none" stroke="#9aa290" stroke-width="2" marker-end="url(#a)"/>
  <text class="flowlbl" x="612" y="182" text-anchor="middle">PCM audio</text>
  <!-- audio <-> agent -->
  <line x1="370" y1="258" x2="350" y2="258" stroke="#9aa290" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
  <!-- sandbox <-> model -->
  <line x1="612" y1="250" x2="688" y2="250" stroke="#9aa290" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
  <text class="flowlbl" x="650" y="242" text-anchor="middle">policy-checked</text>
  <text class="flowlbl" x="650" y="292" text-anchor="middle">WebSocket</text>

  <!-- ===== Level 3: policy gateway ===== -->
  <g filter="url(#soft)"><rect class="policy" x="330" y="360" width="300" height="82" rx="14"/></g>
  <rect x="330" y="341" width="118" height="18" rx="9" fill="#76b900"/>
  <text class="badgeA" x="389" y="354" text-anchor="middle">POLICY DECISION</text>
  <text class="title" x="480" y="392" text-anchor="middle">OpenShell gateway</text>
  <text class="sub" x="480" y="413" text-anchor="middle">evaluates binary · destination · port · method · path</text>

  <!-- agent -> gateway -->
  <path d="M233 288 C233 330, 330 348, 402 358" fill="none" stroke="#9aa290" stroke-width="2" marker-end="url(#a)"/>
  <text class="flowlbl" x="250" y="330" text-anchor="start">robot REST request</text>

  <!-- ===== Level 4: allowed vs denied ===== -->
  <g filter="url(#soft)"><rect class="allow" x="90" y="524" width="360" height="94" rx="14"/></g>
  <rect x="90" y="505" width="80" height="18" rx="9" fill="#76b900"/>
  <text class="badgeA" x="130" y="518" text-anchor="middle">ALLOWED</text>
  <text class="title" x="270" y="556" text-anchor="middle">One-frame camera adapter</text>
  <text class="mono" x="270" y="577" text-anchor="middle">127.0.0.1:8042 · POST /camera/capture</text>
  <text class="sub" x="270" y="597" text-anchor="middle">returns one bounded JPEG, Reachy describes it aloud</text>

  <g filter="url(#soft)"><rect class="deny" x="510" y="524" width="360" height="94" rx="14"/></g>
  <rect x="790" y="505" width="80" height="18" rx="9" fill="#d1495b"/>
  <text class="badgeD" x="830" y="518" text-anchor="middle">DENIED</text>
  <text class="title" x="690" y="556" text-anchor="middle">Reachy daemon → motors</text>
  <text class="mono" x="690" y="577" text-anchor="middle">127.0.0.1:8000 · POST /api/move/goto</text>
  <text class="sub" x="690" y="597" text-anchor="middle">stopped at the boundary, the robot stays still</text>

  <!-- gateway -> allowed (green) -->
  <path d="M420 442 C380 480, 320 494, 285 522" fill="none" stroke="#76b900" stroke-width="2.25" marker-end="url(#ag)"/>
  <text class="flowa" x="300" y="500" text-anchor="middle">capture</text>
  <!-- gateway -> denied (red) -->
  <path d="M540 442 C580 480, 640 494, 675 522" fill="none" stroke="#d1495b" stroke-width="2.25" stroke-dasharray="6 4" marker-end="url(#ad)"/>
  <text class="flowd" x="662" y="500" text-anchor="middle">move</text>
  <g transform="translate(614,486)">
    <circle r="10" fill="#ffffff" stroke="#d1495b" stroke-width="2"/>
    <path d="M-4 -4 L4 4 M4 -4 L-4 4" stroke="#d1495b" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text class="flowlbl" x="480" y="642" text-anchor="middle">The camera works and the head does not move, enforced by policy, not by the app choosing to refuse.</text>
</svg>
