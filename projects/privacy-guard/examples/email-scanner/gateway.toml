# OpenShell gateway configuration for the email-scanner example.
# Generate the ignored gateway.local.toml from this template using the README.
# Do not copy either file into ~/.config/openshell.

[openshell]
version = 1

[[openshell.supervisor.middleware]]
name = "privacy-guard-email-scanner"
grpc_endpoint = "http://REPLACE_WITH_HOST_IP:50051"
max_body_bytes = 4194304
timeout = "5s"
