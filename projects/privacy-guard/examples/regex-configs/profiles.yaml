profiles:
  customer-support:
    - name: email
      patterns:
        - name: common-email
          regex: '(?<![\w.+-])[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}(?![\w.-])'
          confidence: high
    - name: customer-id
      patterns:
        - name: prefixed-customer-id
          regex: '\bCUST-[0-9]{8}\b'
          confidence: high
  hipaa:
    - name: medical-record-number
      patterns:
        - name: prefixed-mrn
          regex: '\bMRN[ :]?[0-9]{6,10}\b'
          confidence: high
          ignore_case: true
