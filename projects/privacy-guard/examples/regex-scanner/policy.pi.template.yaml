version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  pi:
    name: Pi access to the configured model endpoint
    endpoints:
      - host: REPLACE_WITH_MODEL_HOST
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - { host: pi.dev, port: 443 }
    binaries:
      - { path: /usr/bin/pi }
      - { path: /usr/lib/node_modules/@earendil-works/pi-coding-agent/dist/cli.js }
      - { path: /usr/bin/node }

network_middlewares:
  privacy_guard_redaction:
    name: Redact configured email addresses and customer IDs
    middleware: privacy-guard-regex-scanner
    order: 0
    config:
      body_format: json
      on_finding:
        action: redact
        entity_types: [email, customer-id]
        minimum_confidence: high
    on_error: fail_closed
    endpoints:
      include:
        - REPLACE_WITH_MODEL_HOST
