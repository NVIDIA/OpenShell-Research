# OpenShell gateway configuration for the built-in regex-scanner example.
# Pass this example-specific config directly to openshell-gateway.
# Do not copy it into ~/.config/openshell.

[openshell]
version = 1

[[openshell.supervisor.middleware]]
name = "privacy-guard-regex-scanner"
grpc_endpoint = "http://127.0.0.1:50051"
max_body_bytes = 4194304
timeout = "5s"
