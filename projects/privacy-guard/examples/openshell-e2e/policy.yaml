version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  privacy_guard_capture:
    name: Privacy Guard E2E capture endpoint
    endpoints:
      - host: host.openshell.internal
        port: 18080
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/bin/curl }

network_middlewares:
  privacy_guard_redaction:
    name: Redact deterministic example email
    middleware: privacy-guard-e2e
    order: 0
    config:
      body_format: json
      on_finding:
        action: redact
        entity_types: [email]
        minimum_confidence: high
    on_error: fail_closed
    endpoints:
      include: [host.openshell.internal]
