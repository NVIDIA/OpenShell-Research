version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /etc
    - /bin
    - /sbin
    - /opt
  read_write:
    - /sandbox
    - /workspace
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  reachy_daemon:
    name: reachy-daemon-local-simulator
    endpoints:
      - host: host.openshell.internal
        port: 8000
    binaries:
      - path: /usr/bin/python*
      - path: /usr/local/bin/python*
      - path: /opt/reachy-mini-openshell/bin/python*
      - path: /sandbox/**/python*

