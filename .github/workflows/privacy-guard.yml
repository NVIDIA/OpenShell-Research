name: Privacy Guard

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: privacy-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Privacy Guard (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.14"
    defaults:
      run:
        working-directory: projects/privacy-guard
    env:
      UV_CACHE_DIR: ${{ runner.temp }}/privacy-guard-uv-cache
      UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/privacy-guard-venv
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.31"
          python-version: ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run project checks
        run: make check
