<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img"
     aria-label="Privacy routing with middleware. OpenShell's policy forces the sandboxed agent's outbound traffic through an OpenShell middleware service. A router in the middleware detects the data type: image data goes to a model approved to handle sensitive images, and everything else goes to a frontier model in the cloud.">
  <defs>
    <style>
      .panel   { fill:#ffffff; stroke:#e6ebde; stroke-width:1.5; }
      .node    { fill:#ffffff; stroke:#d8ded0; stroke-width:1.5; }
      .mw      { fill:#fbfdf7; stroke:#cbd6bb; stroke-width:1.5; stroke-dasharray:5 4; }
      .local   { fill:#f2f8e8; stroke:#76b900; stroke-width:2; }
      .title   { font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#1b1c1e; }
      .sub     { font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#6a7160; }
      .eyebrow { font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#4f7d00; letter-spacing:.16em; }
      .grouplbl{ font:600 11px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#7f8a71; letter-spacing:.1em; }
      .flowlbl { font:500 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#6a7160; }
      .flowg   { font:600 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#4f7d00; }
      .badge   { font:700 10px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#ffffff; letter-spacing:.08em; }
    </style>
    <filter id="soft" x="-8%" y="-14%" width="116%" height="128%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#1b2a08" flood-opacity="0.10"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0.5 L9 5 L0 9.5 Z" fill="#9aa290"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0.5 L9 5 L0 9.5 Z" fill="#76b900"/></marker>
  </defs>

  <rect class="panel" x="8" y="8" width="884" height="424" rx="20"/>
  <text class="eyebrow" x="450" y="44" text-anchor="middle">PRIVACY ROUTING WITH MIDDLEWARE</text>

  <!-- agent -->
  <g filter="url(#soft)"><rect class="node" x="40" y="190" width="180" height="92" rx="13"/></g>
  <text class="title" x="130" y="232" text-anchor="middle">Sandboxed agent</text>
  <text class="sub" x="130" y="252" text-anchor="middle">on the Reachy</text>

  <!-- middleware container -->
  <rect class="mw" x="300" y="150" width="250" height="172" rx="15"/>
  <text class="grouplbl" x="320" y="174">OPENSHELL MIDDLEWARE</text>
  <g filter="url(#soft)"><rect class="node" x="328" y="200" width="194" height="82" rx="11"/></g>
  <text class="title" x="425" y="234" text-anchor="middle">Router</text>
  <text class="sub" x="425" y="253" text-anchor="middle">detects data type</text>

  <!-- approved image model -->
  <g filter="url(#soft)"><rect class="local" x="640" y="108" width="212" height="92" rx="13"/></g>
  <rect x="640" y="89" width="92" height="18" rx="9" fill="#76b900"/>
  <text class="badge" x="686" y="102" text-anchor="middle">IMAGE DATA</text>
  <text class="title" x="746" y="148" text-anchor="middle">Approved image model</text>
  <text class="sub" x="746" y="168" text-anchor="middle">cleared for sensitive images</text>

  <!-- frontier cloud model -->
  <g filter="url(#soft)"><rect class="node" x="640" y="282" width="212" height="92" rx="13"/></g>
  <text class="title" x="746" y="322" text-anchor="middle">Frontier model</text>
  <text class="sub" x="746" y="342" text-anchor="middle">in the cloud</text>

  <!-- agent -> router -->
  <path d="M222 236 C262 237, 296 238, 326 240" fill="none" stroke="#9aa290" stroke-width="2" marker-end="url(#a)"/>
  <text class="flowlbl" x="272" y="224" text-anchor="middle">all traffic</text>

  <!-- router -> image model (green) -->
  <path d="M522 222 C570 210, 600 175, 638 156" fill="none" stroke="#76b900" stroke-width="2.25" marker-end="url(#ag)"/>
  <text class="flowg" x="566" y="182" text-anchor="middle">image data</text>

  <!-- router -> frontier model -->
  <path d="M522 260 C570 272, 600 307, 638 326" fill="none" stroke="#9aa290" stroke-width="2" marker-end="url(#a)"/>
  <text class="flowlbl" x="566" y="304" text-anchor="middle">everything else</text>

  <text class="flowlbl" x="450" y="404" text-anchor="middle">Policy forces all sandbox traffic through the middleware, so the agent cannot route around it.</text>
</svg>
